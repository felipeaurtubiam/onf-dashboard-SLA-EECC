<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard SLA EECC · ON*NET FIBRA</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --morado:#201751; --cyan:#06EFFF; --txt:#191919; --txt-soft:#5A5E72;
  --bg:#F4F5F8; --card:#FFFFFF; --border:#E5E7EB;
  --ok:#2E7D32; --warn:#F9A825; --crit:#C62828;
  --c1:#06EFFF; --c2:#F9A825; --c3:#E91E63;
  --c1s:#7A9CA8; --c2s:#C2A878; --c3s:#B77A92;
}
*{box-sizing:border-box}
body{margin:0;font-family:'Open Sans','Segoe UI',sans-serif;background:var(--bg);color:var(--txt)}
.header{background:var(--morado);color:#fff;padding:18px 28px;display:flex;align-items:center;gap:16px;border-left:4px solid var(--cyan)}
.header .ast{color:var(--cyan);font-size:28px;line-height:1}
.header .title{font-weight:700;font-size:20px;letter-spacing:.3px}
.header .sub{margin-left:auto;font-size:13px;opacity:.85}
.header .updated{margin-left:auto;text-align:right;font-size:11px;opacity:.85;line-height:1.4}
.header .updated b{display:block;font-size:13px;opacity:1;font-weight:600}
.brand{display:flex;align-items:center;gap:10px;padding:6px 12px;background:rgba(255,255,255,.06);border-radius:6px}
.brand b{font-weight:800}
.tabs{display:flex;gap:0;background:var(--card);border-bottom:1px solid var(--border)}
.tab{padding:14px 22px;cursor:pointer;font-size:13px;font-weight:600;color:var(--txt-soft);border-bottom:3px solid transparent;user-select:none}
.tab.active{color:var(--morado);border-bottom-color:var(--cyan);background:#FAFBFC}
.tab:hover:not(.active){background:#F7F8FA}
.filters{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;padding:14px 24px;background:#FAFBFC;border-bottom:1px solid var(--border);align-items:end}
.fld{display:flex;flex-direction:column;gap:4px}
.fld label{font-size:11px;color:var(--txt-soft);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.fld select,.fld input{padding:7px 10px;font-size:13px;border:1px solid var(--border);border-radius:5px;background:#fff;font-family:inherit}
.toggle{display:flex;background:#fff;border:1px solid var(--border);border-radius:5px;overflow:hidden}
.toggle button{flex:1;padding:7px 8px;background:transparent;border:0;cursor:pointer;font-size:12px;font-weight:600;color:var(--txt-soft)}
.toggle button.on{background:var(--morado);color:#fff}
.chk{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--txt-soft)}
.dd{position:relative}
.dd .dd-btn{padding:7px 28px 7px 10px;font-size:13px;border:1px solid var(--border);border-radius:5px;background:#fff;cursor:pointer;text-align:left;width:100%;font-family:inherit;color:var(--txt);position:relative}
.dd .dd-btn::after{content:"";position:absolute;right:10px;top:50%;width:6px;height:6px;border-right:1.5px solid var(--txt-soft);border-bottom:1.5px solid var(--txt-soft);transform:translateY(-70%) rotate(45deg)}
.dd .dd-panel{display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:#fff;border:1px solid var(--border);border-radius:6px;box-shadow:0 6px 16px rgba(0,0,0,.08);z-index:50;max-height:240px;overflow-y:auto;padding:6px 0}
.dd.open .dd-panel{display:block}
.dd .dd-item{display:flex;align-items:center;gap:8px;padding:6px 10px;font-size:13px;color:var(--txt);cursor:pointer;user-select:none}
.dd .dd-item:hover{background:#F4F5F8}
.dd .dd-item input{margin:0}
.dd .dd-all{border-bottom:1px solid var(--border);font-weight:600;color:var(--morado)}
.main{display:grid;grid-template-columns:1fr 280px;gap:16px;padding:20px 24px}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px}
.panel h3{margin:0 0 12px;font-size:13px;color:var(--txt-soft);font-weight:700;text-transform:uppercase;letter-spacing:.4px}
.chart-wrap{position:relative;height:380px}
.kpis{display:flex;flex-direction:column;gap:12px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;position:relative;overflow:hidden}
.kpi .lbl{font-size:11px;color:var(--txt-soft);font-weight:700;letter-spacing:.3px;text-transform:uppercase}
.kpi .val{font-size:30px;font-weight:800;color:var(--morado);margin:4px 0 2px;line-height:1}
.kpi .delta{font-size:12px;font-weight:600}
.kpi .delta.up{color:var(--ok)}
.kpi .delta.dn{color:var(--crit)}
.kpi .meta{font-size:11px;color:var(--txt-soft);margin-top:4px}
.kpi .spark-wrap{position:relative;height:34px;margin-top:6px}
.kpi .spark-wrap canvas{position:absolute;inset:0}
.bottom{padding:0 24px 24px}
.loader{padding:60px 40px;text-align:center;color:var(--txt-soft)}
.loader h2{color:var(--morado);margin:0 0 8px}
@media(max-width:900px){.main{grid-template-columns:1fr}.filters{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="header">
  <span class="ast">&#10034;</span>
  <div class="brand"><b>ON*NET</b> FIBRA</div>
  <div class="title">Control de SLA · Empresas Contratistas</div>
  <div class="updated"><span>Última actualización</span><b id="hdrUpdated">—</b></div>
</div>

<div id="app" style="display:none">
<div class="tabs" id="tabs">
  <div class="tab active" data-tab="C">SLA 10/20/36 hrs &middot; Cr&iacute;tica + Fibra Oscura</div>
  <div class="tab" data-tab="E">SLA 12/24/48 hrs &middot; Est&aacute;ndar</div>
  <div class="tab" data-tab="R">SLA 12/24/48 hrs &middot; Reclamo</div>
</div>

<div class="filters">
  <div class="fld"><label>Mes desde</label><select id="fDesde"></select></div>
  <div class="fld"><label>Mes hasta</label><select id="fHasta"></select></div>
  <div class="fld"><label>EECC</label><div class="dd" id="ddEECC"><button class="dd-btn" type="button">Todos</button><div class="dd-panel"></div></div></div>
  <div class="fld"><label>Agencia</label><div class="dd" id="ddAgencia"><button class="dd-btn" type="button">Todas</button><div class="dd-panel"></div></div></div>
  <div class="fld"><label>Tipo Ticket</label><div class="dd" id="ddTipo"><button class="dd-btn" type="button">Todos</button><div class="dd-panel"></div></div></div>
  <div class="fld">
    <label>Medici&oacute;n</label>
    <div class="toggle" id="fMet">
      <button data-m="SPR">SPR</button>
      <button data-m="CPR" class="on">CPR</button>
      <button data-m="AMBOS">Ambos</button>
    </div>
    <label class="chk" style="margin-top:6px"><input type="checkbox" id="fMetas" checked> Mostrar metas</label>
  </div>
</div>

<div class="main">
  <div class="panel">
    <h3 id="chartTitle">Evoluci&oacute;n SLA &middot; Cr&iacute;tica</h3>
    <div class="chart-wrap"><canvas id="lineChart"></canvas></div>
  </div>
  <div class="kpis" id="kpis"></div>
</div>

<div class="bottom">
  <div class="panel">
    <h3>Volumen mensual de tickets por EECC</h3>
    <div class="chart-wrap" style="height:280px"><canvas id="volChart"></canvas></div>
  </div>
</div>
</div>

<div id="loader" class="loader">
  <h2>Cargando datos…</h2>
  <p>Leyendo <code>payload.json</code></p>
</div>

<script>
let DATA;

const TAB_TIPOS = { C: ["Critica","Fibra Oscura"], E: ["Estandar"], R: ["Reclamo"] };
const TAB_UMBRALES = { C: ["10","20","36"], E: ["12","24","48"], R: ["12","24","48"] };
const TAB_METAS = {
  C: {"10":60,"20":90,"36":100},
  E: {"12":60,"24":70,"48":100},
  R: {"12":60,"24":70,"48":100},
};
const COLOR = {CPR:["#06EFFF","#F9A825","#E91E63"], SPR:["#7A9CA8","#C2A878","#B77A92"]};
const EECC_COLOR = {COBRA:"#06EFFF",DOMINION:"#201751",LARI:"#F9A825",TRAZA:"#E91E63",ZENER:"#5A5E72"};
const MES_LBL = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
function lblPeriodo(p){const [y,m]=p.split("-");return `${MES_LBL[+m-1]}-${y.slice(2)}`}

let state, lineChart, volChart, sparkCharts=[];

function periodosRango(){
  return DATA.meta.periodos.filter(p => p >= state.desde && p <= state.hasta);
}
function rowsFiltradas(){
  const ps = new Set(periodosRango());
  const tiposTab = new Set(TAB_TIPOS[state.tab]);
  const tiposSel = new Set([...state.tipo].filter(t => tiposTab.has(t)));
  return DATA.agregado.filter(r =>
    ps.has(r.periodo) &&
    state.eecc.has(r.eecc) &&
    state.agencia.has(r.agencia) &&
    tiposSel.has(r.tipo)
  );
}

function serieMensual(metrica){
  const ps = periodosRango();
  const umbrales = TAB_UMBRALES[state.tab];
  const acc = {};
  for(const p of ps) for(const u of umbrales) acc[`${p}|${u}`] = {c:0,t:0};
  for(const r of rowsFiltradas()){
    if(r.metrica !== metrica) continue;
    const k = `${r.periodo}|${r.umbral}`;
    if(!(k in acc)) continue;
    acc[k].c += r.cumple; acc[k].t += r.total;
  }
  const series = umbrales.map(u => ({
    umbral: u,
    data: ps.map(p => {
      const v = acc[`${p}|${u}`];
      return v.t > 0 ? +(100*v.c/v.t).toFixed(2) : null;
    })
  }));
  return {labels: ps.map(lblPeriodo), series};
}

function kpiData(metrica){
  const ps = periodosRango();
  const umbrales = [...TAB_UMBRALES[state.tab]].reverse();
  const rows = rowsFiltradas();
  const out = [];
  for(const u of umbrales){
    const ultimo = ps[ps.length-1];
    const prev = ps[ps.length-2];
    const spark = ps.map(p => {
      let c=0,t=0;
      for(const r of rows){
        if(r.umbral !== u || r.metrica !== metrica) continue;
        if(r.periodo === p){c+=r.cumple;t+=r.total}
      }
      return t>0 ? 100*c/t : null;
    });
    let cAct=0,tAct=0,cPrev=0,tPrev=0;
    for(const r of rows){
      if(r.umbral !== u || r.metrica !== metrica) continue;
      if(r.periodo === ultimo){cAct+=r.cumple;tAct+=r.total}
      if(r.periodo === prev){cPrev+=r.cumple;tPrev+=r.total}
    }
    const pAct = tAct>0 ? 100*cAct/tAct : null;
    const pPrev = tPrev>0 ? 100*cPrev/tPrev : null;
    const meta = TAB_METAS[state.tab][u];
    out.push({umbral:u, valor:pAct, delta:(pAct!=null && pPrev!=null) ? pAct - pPrev : null, meta, spark});
  }
  return out;
}

function renderLine(){
  const ctx = document.getElementById("lineChart");
  const ps = periodosRango();
  const datasets = [];
  const colors = COLOR.CPR;
  const colorsS = COLOR.SPR;
  const umbrales = TAB_UMBRALES[state.tab];

  const showSPR = state.metrica==="SPR" || state.metrica==="AMBOS";
  const showCPR = state.metrica==="CPR" || state.metrica==="AMBOS";

  if(showCPR){
    const {series} = serieMensual("CPR");
    series.forEach((s,i) => datasets.push({
      label:`CPR ≤${s.umbral}h`, data:s.data, borderColor:colors[i],
      backgroundColor:colors[i]+"20", tension:.3, borderWidth:2.5, pointRadius:3
    }));
  }
  if(showSPR){
    const {series} = serieMensual("SPR");
    series.forEach((s,i) => datasets.push({
      label:`SPR ≤${s.umbral}h`, data:s.data, borderColor:colorsS[i],
      borderDash:[5,4], tension:.3, borderWidth:2, pointRadius:2
    }));
  }
  if(state.metas){
    const metas = TAB_METAS[state.tab];
    umbrales.forEach((u,i) => datasets.push({
      label:`Meta ${u}h (${metas[u]}%)`, data: ps.map(()=>metas[u]),
      borderColor:colors[i], borderDash:[2,3], borderWidth:1, pointRadius:0, fill:false
    }));
  }

  if(lineChart) lineChart.destroy();
  lineChart = new Chart(ctx, {
    type:"line",
    data:{labels: ps.map(lblPeriodo), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{boxWidth:14,font:{size:11}}}},
      scales:{y:{min:0,max:110,ticks:{callback:v=>v+"%"}}}
    }
  });
  document.getElementById("chartTitle").textContent = "Evolución SLA · " + TAB_TIPOS[state.tab].join(" + ");
}

function renderKPIs(){
  const cont = document.getElementById("kpis");
  cont.innerHTML = "";
  sparkCharts.forEach(c=>c.destroy()); sparkCharts=[];
  const metrica = state.metrica==="SPR" ? "SPR" : "CPR";
  const ds = kpiData(metrica);
  ds.forEach((k,idx) => {
    const div = document.createElement("div");
    div.className = "kpi";
    const valTxt = k.valor!=null ? k.valor.toFixed(1)+"%" : "—";
    const delta = k.delta!=null ? (k.delta>=0?"+":"")+k.delta.toFixed(1)+" pp vs mes ant." : "—";
    const deltaClass = k.delta!=null && k.delta>=0 ? "up":"dn";
    const brecha = k.valor!=null ? (k.valor - k.meta).toFixed(1)+" pp vs meta "+k.meta+"%" : "";
    div.innerHTML = `
      <div class="lbl">≤ ${k.umbral} horas · ${metrica}</div>
      <div class="val">${valTxt}</div>
      <div class="delta ${deltaClass}">${delta}</div>
      <div class="meta">${brecha}</div>
      <div class="spark-wrap"><canvas id="spark${idx}"></canvas></div>`;
    cont.appendChild(div);
    const sc = new Chart(document.getElementById("spark"+idx),{
      type:"line",
      data:{labels:k.spark.map((_,i)=>i), datasets:[{data:k.spark,borderColor:"#201751",borderWidth:1.5,pointRadius:0,tension:.3,fill:false}]},
      options:{plugins:{legend:{display:false}},scales:{x:{display:false},y:{display:false,min:0,max:100}},responsive:true,maintainAspectRatio:false}
    });
    sparkCharts.push(sc);
  });
}

function renderVolumen(){
  const ps = periodosRango();
  const eeccArr = [...state.eecc];
  const datasets = eeccArr.map(e => ({
    label:e,
    backgroundColor: EECC_COLOR[e] || "#999",
    data: ps.map(p => {
      let t = 0;
      for(const r of DATA.volumen_mensual){
        if(r.periodo===p && r.eecc===e) t += r.tickets;
      }
      return t;
    })
  }));
  if(volChart) volChart.destroy();
  volChart = new Chart(document.getElementById("volChart"),{
    type:"bar",
    data:{labels: ps.map(lblPeriodo), datasets},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{position:"bottom",labels:{boxWidth:14,font:{size:11}}}},
      scales:{x:{stacked:true},y:{stacked:true,ticks:{callback:v=>v.toLocaleString()}}}
    }
  });
}

function renderAll(){renderLine();renderKPIs();renderVolumen();}

function buildDropdown(id, items, sel, labelSingular, labelPlural){
  const dd = document.getElementById(id);
  const btn = dd.querySelector(".dd-btn");
  const panel = dd.querySelector(".dd-panel");
  function refreshLabel(){
    if(sel.size === items.length || sel.size === 0) btn.textContent = "Todos: " + labelPlural;
    else if(sel.size === 1) btn.textContent = [...sel][0];
    else btn.textContent = sel.size + " " + labelPlural + " sel.";
  }
  function rebuild(){
    panel.innerHTML = "";
    const allChecked = sel.size === items.length;
    const allLbl = document.createElement("label");
    allLbl.className = "dd-item dd-all";
    allLbl.innerHTML = `<input type="checkbox" ${allChecked?"checked":""}> Seleccionar todos`;
    allLbl.querySelector("input").onchange = (e) => {
      if(e.target.checked){ items.forEach(i => sel.add(i)); }
      else { sel.clear(); }
      rebuild(); refreshLabel(); renderAll();
    };
    panel.appendChild(allLbl);
    items.forEach(it => {
      const lbl = document.createElement("label");
      lbl.className = "dd-item";
      lbl.innerHTML = `<input type="checkbox" ${sel.has(it)?"checked":""}> <span>${it}</span>`;
      lbl.querySelector("input").onchange = (e) => {
        if(e.target.checked) sel.add(it); else sel.delete(it);
        if(sel.size === 0){ items.forEach(i => sel.add(i)); rebuild(); }
        refreshLabel(); renderAll();
        const allCb = panel.querySelector(".dd-all input");
        allCb.checked = sel.size === items.length;
      };
      panel.appendChild(lbl);
    });
  }
  btn.onclick = (e) => {
    e.stopPropagation();
    document.querySelectorAll(".dd.open").forEach(o => {if(o!==dd) o.classList.remove("open")});
    dd.classList.toggle("open");
  };
  panel.onclick = (e) => e.stopPropagation();
  refreshLabel(); rebuild();
}

function initFilters(){
  const desde = document.getElementById("fDesde");
  const hasta = document.getElementById("fHasta");
  DATA.meta.periodos.forEach(p => {
    desde.add(new Option(lblPeriodo(p), p));
    hasta.add(new Option(lblPeriodo(p), p));
  });
  desde.value = state.desde; hasta.value = state.hasta;
  desde.onchange = e => {state.desde = e.target.value; renderAll()};
  hasta.onchange = e => {state.hasta = e.target.value; renderAll()};

  buildDropdown("ddEECC", DATA.meta.eecc, state.eecc, "EECC", "EECC");
  buildDropdown("ddAgencia", DATA.meta.agencias, state.agencia, "Agencia", "agencias");
  buildDropdown("ddTipo", TAB_TIPOS[state.tab], state.tipo, "Tipo", "tipos");

  document.getElementById("fMetas").onchange = e => {state.metas = e.target.checked; renderAll()};
  document.querySelectorAll("#fMet button").forEach(b => b.onclick = () => {
    state.metrica = b.dataset.m;
    document.querySelectorAll("#fMet button").forEach(x => x.classList.toggle("on", x===b));
    renderAll();
  });

  document.querySelectorAll(".tab").forEach(t => t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    state.tab = t.dataset.tab;
    state.tipo = new Set(state.tab === "C" ? ["Critica"] : TAB_TIPOS[state.tab]);
    buildDropdown("ddTipo", TAB_TIPOS[state.tab], state.tipo, "Tipo", "tipos");
    renderAll();
  });

  document.addEventListener("click", () => {
    document.querySelectorAll(".dd.open").forEach(o => o.classList.remove("open"));
  });
}

function pintarUltimaActualizacion(){
  const raw = DATA.meta && DATA.meta.last_update;
  if(!raw){ document.getElementById("hdrUpdated").textContent = "—"; return; }
  const norm = raw.replace(" ","T");
  const d = new Date(norm);
  if(isNaN(d)){ document.getElementById("hdrUpdated").textContent = raw; return; }
  const pad = n => String(n).padStart(2,"0");
  const txt = `${pad(d.getDate())}/${pad(d.getMonth()+1)}/${d.getFullYear()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  document.getElementById("hdrUpdated").textContent = txt;
}

function boot(){
  state = {
    tab: "C",
    desde: DATA.meta.periodos[0],
    hasta: DATA.meta.periodos[DATA.meta.periodos.length-1],
    eecc: new Set(DATA.meta.eecc),
    agencia: new Set(DATA.meta.agencias),
    tipo: new Set(["Critica"]),
    metrica: "CPR",
    metas: true,
  };
  document.getElementById("loader").style.display = "none";
  document.getElementById("app").style.display = "";
  pintarUltimaActualizacion();
  initFilters();
  renderAll();
}

fetch("payload.json?v=" + Date.now())
  .then(r => { if(!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
  .then(json => { DATA = json; boot(); })
  .catch(err => {
    console.error("Error cargando payload.json:", err);
    document.getElementById("loader").innerHTML =
      '<h2 style="color:#C62828">Error al cargar los datos</h2>' +
      '<p>No se pudo leer <code>payload.json</code>: ' + err.message + '</p>' +
      '<p style="color:#666">Verifica que el archivo exista en la misma carpeta que este HTML.</p>';
  });
</script>
</body>
</html>
